<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Ticket Classifier</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="background"></div>

  <div class="container">

    <header>
      <h1>🎫 AI Support Ticket Classifier</h1>
      <p>
        Automatically classify and prioritize support tickets using OpenAI.
      </p>
    </header>

    <section class="card input-card">
      <label for="messages">
        Enter support messages (one per line)
      </label>

      <textarea
        id="messages"
        placeholder="My payment got deducted but service is not activated
App crashes every time I login
How to change my email address?"
      ></textarea>

      <button id="classifyBtn">
        Classify Tickets
      </button>
    </section>

    <section class="results-section">
      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <span>Analyzing tickets...</span>
      </div>

      <div id="results" class="results-grid"></div>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
